[profile.default]
src = "src"
scripts = "scripts"
out = "out"
libs = ["lib"]
solc_version = "0.8.19"
via_ir = true
optimizer = true
optimizer_runs = 200
fs_permissions = [{ access = "read-write", path = "." }]

[rpc_endpoints]
mantle = "https://rpc.mantle.xyz"
mantle_pub = "https://mantle.publicnode.com"
mainnet = "https://ethereum-rpc.publicnode.com"
